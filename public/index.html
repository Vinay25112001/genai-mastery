    <!-- GitHub Pages SPA redirect handler -->
    <!-- When a user loads a deep URL on GitHub Pages, the server returns 404.
         The 404.html page redirects here with the path encoded as a query param.
         This script restores the original URL for React Router. -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
